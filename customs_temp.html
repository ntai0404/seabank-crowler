<script type="text/javascript">
	//get modules by page Id
	var arrPages = [];
	var arrRegions = [];
	var arrModules = [];

	$(document).ready(function() {
		pageLoad();
	});
	var pageId, global_SiteName;
	var siteName = '';
	var newRootPath = "";

	function loadComplete(data, textStatus, jqxhr) {
		var param = jqxhr.params.split("?")[1];
		var p = parseParamModule(param);
		var args = param.split("|");
		eval("var item = loadData('" + param + "')");
		var moduleId = "#" + p.moduleId;
		var btnText = "<div class='tnx-admin-btn'>";
		btnText += "<a onclick='deleteModule(this);' title='Xóa module' class='tnx-admin-btn-add'><span class='fa fa-fw fa-times'></span></a>";
		btnText += "<a class='tnx-admin-btn-add' title='Sửa module' onclick='editModule(this);'><span class='fa fa-fw fa-edit'></span></a>";
		btnText += "<a onclick='addModule(this);' title='Thêm mới module' class='tnx-admin-btn-add'><span class='fa fa-fw fa-plus'></span></a>";
		btnText += "</div>";
		$(moduleId).append(btnText);
	}

	function pageLoad() {
		siteName = window.location.href;
		if (siteName.indexOf('localhost') >= 0
				|| siteName.indexOf('10.224.128.185') >= 0
				|| siteName.indexOf('portal') >= 0
				|| siteName.indexOf('123.30.210.237') >= 0

		) {
			siteName = siteDefault;
		} else if (siteName.indexOf("http://customs.gov.vn") >= 0
				|| siteName.indexOf("https://customs.gov.vn") >= 0
				|| siteName.indexOf("http://www.customs.gov.vn") >= 0
				|| siteName.indexOf("https://www.customs.gov.vn") >= 0
				|| siteName.indexOf("https://www.customs.gov.vn/") >= 0) {
			siteName = "https://tongcuc.customs.gov.vn/"

		} else {
			var pathname = window.location.pathname;
			if (pathname.length > 1) {
				pathname = pathname.substring(1);
				var firstS = pathname.lastIndexOf('/');
				if (firstS != -1) {
					pathname = "/" + pathname.substring(0, firstS) + "/";
				} else {
					pathname = "/";
				}
			}
			siteName = window.location.origin + pathname;
		}
		 if (ngon_ngu_session === 'en') {
			siteName = siteName + "en/";
		} 
		var getListPageUrl = 'bridge?url=' + main_new + '/api/GetListPage';
		shellService.ExecuteGetAction(getListPageUrl, {
			site : siteName,
		}).then(
				function(ret) {
					arrPages = ret.d;
					global_SiteName = arrPages[0].siteName;
					homePage = $.grep(arrPages, function(a) {
						return a.siteName == global_SiteName && a.isDefault;
					})[0];
					_sitename = homePage.siteName;
					_chuyenTrang = homePage.maChuyenTrang;
					_tenDayDu = homePage.tenDayDu;
					/*Set title name*/
					$("title")[0].innerHTML = _tenDayDu;
					pageId = getParams("pageId") == undefined ? homePage.id
							: getParams("pageId");
					postShellService.ExecuteGetAction(
							'bridge?url=' + main_new + '/api/GetPageControl', {
								pageId : pageId,
							}).then(
							function(data) {
								var pageItem = data.d[0];
								$("#main").load(
										"/themes/"
												+ pageItem.theme.themeName
												+ "/skin.jsp?a="
												+ new Date().getMilliseconds(),
										function() {
											// 					$("#main").kendoDropTargetArea({
											// 						filter : ".tnx-region",
											// 						dragenter : droptargetOnDragEnter,
											// 						dragleave : droptargetOnDragLeave,
											// 						drop : droptargetOnDrop
											// 					});
										});
								arrRegions = pageItem.regions;
								arrModules = pageItem.modules;
							});
				});
	}
</script>
