version: 1.0.0
slice_name: So sánh Kim ngạch Xuất khẩu và Nhập khẩu (Hải quan)
viz_type: dist_bar
params:
  adhoc_filters:
  - clause: WHERE
    expressionType: SQL
    sqlExpression: period LIKE '%(tỷ USD)'
  - clause: WHERE
    expressionType: SQL
    sqlExpression: category IN ('Xuất khẩu','Nhập khẩu')
  groupby:
  - category
  metrics:
  - aggregate: MAX
    column:
      column_name: value_usd
      type: FLOAT
    expressionType: SIMPLE
    label: Giá trị (tỷ USD)
    optionName: metric_max_value
  row_limit: 50
  show_legend: false
  x_axis_label: Loại kim ngạch
  y_axis_label: Giá trị (tỷ USD)
  viz_type: dist_bar
