version: 1.0.0
slice_name: So sanh Xuat khau va Nhap khau (Hai quan)
viz_type: dist_bar
params:
  adhoc_filters:
  - clause: WHERE
    expressionType: SQL
    sqlExpression: period LIKE '%(tỷ USD)'
  - clause: WHERE
    expressionType: SQL
    sqlExpression: category IN ('Xuất khẩu','Nhập khẩu')
  columns:
  - category
  groupby:
  - period
  metrics:
  - aggregate: MAX
    column:
      column_name: value_usd
      type: FLOAT
    expressionType: SIMPLE
    label: MAX(value_usd)
    optionName: metric_max_value
  row_limit: 500
  show_legend: true
  x_axis_label: Chi tieu
  y_axis_label: Gia tri (ty USD)
  viz_type: dist_bar
