sql: "WITH base AS (\n  SELECT\n    timestamp,\n    gold_type,\n    substr(timestamp,\
  \ 1, 10) AS snapshot_date,\n    CAST(REPLACE(COALESCE(CAST(sell_price AS TEXT),\
  \ '0'), ',', '') AS FLOAT) AS sell_price_num\n  FROM \"gold_prices\"\n), latest\
  \ AS (\n  SELECT MAX(snapshot_date) AS max_snapshot_date FROM base\n)\nSELECT\n\
  \  b.timestamp,\n  b.gold_type,\n  b.snapshot_date,\n  b.snapshot_date || ' | '\
  \ || b.gold_type AS gold_label,\n  CASE\n    WHEN b.gold_type LIKE '%nhan SJC 99,99%\
  \ 1 chi, 2 chi, 5 chi%' OR b.gold_type LIKE '%nhẫn SJC 99,99% 1 chỉ, 2 chỉ, 5 chỉ%'\
  \ THEN 'Nhan 99.99 1-5 chi'\n    WHEN b.gold_type LIKE '%nhan SJC 99,99% 0.5 chi,\
  \ 0.3 chi%' OR b.gold_type LIKE '%nhẫn SJC 99,99% 0.5 chỉ, 0.3 chỉ%' THEN 'Nhan\
  \ 99.99 0.3-0.5 chi'\n    WHEN b.gold_type LIKE '%SJC 5 chi%' OR b.gold_type LIKE\
  \ '%SJC 5 chỉ%' THEN 'SJC 5 chi'\n    WHEN b.gold_type LIKE '%SJC 1L, 10L, 1KG%'\
  \ THEN 'SJC 1L-1KG'\n    WHEN b.gold_type LIKE '%SJC 0.5 chi, 1 chi, 2 chi%' OR\
  \ b.gold_type LIKE '%SJC 0.5 chỉ, 1 chỉ, 2 chỉ%' THEN 'SJC 0.5-2 chi'\n    ELSE\
  \ substr(b.gold_type, 1, 24)\n  END AS gold_type_short,\n  b.sell_price_num,\n \
  \ b.sell_price_num / 1000000.0 AS sell_price_million,\n  CASE WHEN b.snapshot_date\
  \ = l.max_snapshot_date THEN 1 ELSE 0 END AS is_latest\nFROM base b\nCROSS JOIN\
  \ latest l\n"
