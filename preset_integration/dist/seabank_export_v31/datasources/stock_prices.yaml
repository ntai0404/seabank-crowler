sql: "WITH enriched AS (\n  SELECT\n    timestamp,\n    symbol,\n    datetime(ngay)\
  \ AS ngay,\n    gia_mo_cua,\n    gia_cao_nhat,\n    gia_thap_nhat,\n    gia_dong_cua,\n\
  \    thay_doi,\n    khoi_luong,\n    gia_tri,\n    FIRST_VALUE(gia_dong_cua) OVER\
  \ (\n      PARTITION BY symbol\n      ORDER BY datetime(ngay) ASC\n    ) AS base_close_price\n\
  \  FROM \"stock_prices\"\n)\nSELECT\n  timestamp,\n  symbol,\n  ngay,\n  gia_mo_cua,\n\
  \  gia_cao_nhat,\n  gia_thap_nhat,\n  gia_dong_cua,\n  base_close_price,\n  CASE\n\
  \    WHEN base_close_price IS NOT NULL AND base_close_price > 0\n      THEN (gia_dong_cua\
  \ / base_close_price - 1.0) * 100.0\n    ELSE 0\n  END AS pct_change_base,\n  thay_doi,\n\
  \  khoi_luong,\n  gia_tri\nFROM enriched\n"
