sql: SELECT timestamp, category, period, CASE WHEN period LIKE 'T%-____' THEN 'Thang'
  WHEN period LIKE 'K%-T%-____' THEN 'Ky' ELSE 'Khac' END AS period_group, REPLACE(period,
  '-20', '/') AS period_label, CASE WHEN period = 'K2-T1-2026' THEN 'K2-T1/26' WHEN
  period = 'T2-2026' THEN 'T2/26' WHEN period = 'K1-T2-2026' THEN 'K1-T2/26' WHEN
  period = 'K2-T2-2026' THEN 'K2-T2/26' ELSE REPLACE(period, '-20', '/') END AS period_label_short,
  CASE WHEN period = 'K2-T1-2026' THEN 1 WHEN period = 'T2-2026' THEN 2 WHEN period
  = 'K1-T2-2026' THEN 3 WHEN period = 'K2-T2-2026' THEN 4 ELSE 999 END AS period_sort,
  export_value, import_value, change_pct FROM "customs_commodity_details"
