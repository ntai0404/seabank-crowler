sql: SELECT timestamp, company_name, business_type, CASE WHEN lower(coalesce(business_type,
  '')) LIKE '%may/thiet bi%' THEN 'May thiet bi' WHEN lower(coalesce(business_type,
  '')) LIKE '%nguyen phu lieu%' THEN 'Nguyen phu lieu' WHEN lower(coalesce(business_type,
  '')) LIKE '%nhuom%' THEN 'Nhuom/hoan tat' WHEN lower(coalesce(business_type, ''))
  LIKE '%keo soi%' THEN 'Keo soi' WHEN lower(coalesce(business_type, '')) LIKE '%det
  vai%' THEN 'Det vai' WHEN lower(coalesce(business_type, '')) LIKE '%det%' THEN 'Det
  vai' WHEN lower(coalesce(business_type, '')) LIKE '%may%' THEN 'May mac' ELSE 'Khac'
  END AS business_type_group, address, website FROM "textile_directory"
