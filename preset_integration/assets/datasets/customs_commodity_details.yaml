version: 1.0.0
table_name: customs_commodity_details
main_dttm_col: timestamp
description: Tong hop chi tiet xuat nhap khau theo ky bao cao
columns:
- column_name: timestamp
  verbose_name: Thoi gian cap nhat
  is_dttm: true
  type: DATETIME
- column_name: category
  verbose_name: Nhom du lieu
  type: STRING
- column_name: period
  verbose_name: Ky bao cao
  type: STRING
- column_name: period_group
  verbose_name: Nhom ky bao cao
  type: STRING
- column_name: period_label
  verbose_name: Ky bao cao ngan
  type: STRING
- column_name: period_label_short
  verbose_name: Ky bao cao rut gon
  type: STRING
- column_name: period_sort
  verbose_name: Thu tu ky bao cao
  type: FLOAT
- column_name: export_value
  verbose_name: Xuat khau
  type: FLOAT
- column_name: import_value
  verbose_name: Nhap khau
  type: FLOAT
- column_name: change_pct
  verbose_name: Bien dong
  type: FLOAT
metrics:
- metric_name: max_export_value
  verbose_name: Xuat khau lon nhat
  expression: MAX(export_value)
- metric_name: max_import_value
  verbose_name: Nhap khau lon nhat
  expression: MAX(import_value)
database_uuid: ${DATABASE_UUID}
schema: SeaBank_Data
sql: SELECT
  timestamp,
  category,
  period,
  CASE
    WHEN period LIKE 'T%-____' THEN 'Thang'
    WHEN period LIKE 'K%-T%-____' THEN 'Ky'
    ELSE 'Khac'
  END AS period_group,
  REPLACE(period, '-20', '/') AS period_label,
  CASE
    WHEN period = 'K2-T1-2026' THEN 'K2T1-26'
    WHEN period = 'T2-2026' THEN 'T2-26'
    WHEN period = 'K1-T2-2026' THEN 'K1T2-26'
    WHEN period = 'K2-T2-2026' THEN 'K2T2-26'
    ELSE REPLACE(period, '-20', '/')
  END AS period_label_short,
  CASE
    WHEN period = 'K2-T1-2026' THEN 1
    WHEN period = 'T2-2026' THEN 2
    WHEN period = 'K1-T2-2026' THEN 3
    WHEN period = 'K2-T2-2026' THEN 4
    ELSE 999
  END AS period_sort,
  export_value,
  import_value,
  change_pct
  FROM "customs_commodity_details"
uuid: 44b8f6ce-d922-4857-8478-41d81a929253
