version: 1.0.0
table_name: gold_prices
main_dttm_col: timestamp
description: Gia vang SJC tu WebGia
columns:
- column_name: timestamp
  verbose_name: Thoi gian cap nhat
  is_dttm: true
  type: DATETIME
- column_name: gold_type
  verbose_name: Loai vang
  type: STRING
- column_name: snapshot_date
  verbose_name: Ngay cap nhat
  type: STRING
- column_name: buy_price
  verbose_name: Gia mua
  type: FLOAT
- column_name: sell_price
  verbose_name: Gia ban
  type: FLOAT
- column_name: buy_price_num
  verbose_name: Gia mua (so)
  type: FLOAT
- column_name: sell_price_num
  verbose_name: Gia ban (so)
  type: FLOAT
metrics:
- metric_name: avg_sell_price
  verbose_name: Gia ban trung binh
  expression: AVG(sell_price_num)
database_uuid: ${DATABASE_UUID}
schema: SeaBank_Data
sql: SELECT
  timestamp,
  gold_type,
  substr(timestamp, 1, 10) AS snapshot_date,
  buy_price,
  sell_price,
  CAST(REPLACE(COALESCE(CAST(buy_price AS TEXT), '0'), ',', '') AS FLOAT) AS buy_price_num,
  CAST(REPLACE(COALESCE(CAST(sell_price AS TEXT), '0'), ',', '') AS FLOAT) AS sell_price_num
  FROM "gold_prices"
uuid: 44b8f6ce-d922-4857-8478-41d81a929219
