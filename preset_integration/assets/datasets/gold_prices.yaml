version: 1.0.0
table_name: gold_prices
main_dttm_col: timestamp
description: Gia vang SJC tu WebGia
columns:
- column_name: timestamp
  verbose_name: Thoi gian cap nhat
  is_dttm: true
  type: DATETIME
- column_name: gold_type
  verbose_name: Loai vang
  type: STRING
- column_name: snapshot_date
  verbose_name: Ngay cap nhat
  type: STRING
- column_name: gold_label
  verbose_name: Nhan cot
  type: STRING
- column_name: gold_type_short
  verbose_name: Loai vang rut gon
  type: STRING
- column_name: sell_price_num
  verbose_name: Gia ban (so)
  type: FLOAT
- column_name: sell_price_million
  verbose_name: Gia ban (trieu VND)
  type: FLOAT
- column_name: is_latest
  verbose_name: Ban ghi moi nhat
  type: FLOAT
metrics:
- metric_name: max_sell_price
  verbose_name: Gia ban cao nhat
  expression: MAX(sell_price_num)
- metric_name: max_sell_price_million
  verbose_name: Gia ban cao nhat (trieu)
  expression: MAX(sell_price_million)
database_uuid: ${DATABASE_UUID}
schema: SeaBank_Data
sql: |
  WITH base AS (
    SELECT
      timestamp,
      gold_type,
      substr(timestamp, 1, 10) AS snapshot_date,
      CAST(REPLACE(COALESCE(CAST(sell_price AS TEXT), '0'), ',', '') AS FLOAT) AS sell_price_num
    FROM "gold_prices"
  ), latest AS (
    SELECT MAX(snapshot_date) AS max_snapshot_date FROM base
  )
  SELECT
    b.timestamp,
    b.gold_type,
    b.snapshot_date,
    b.snapshot_date || ' | ' || b.gold_type AS gold_label,
    CASE
      WHEN b.gold_type LIKE '%nhan SJC 99,99% 1 chi, 2 chi, 5 chi%' OR b.gold_type LIKE '%nhẫn SJC 99,99% 1 chỉ, 2 chỉ, 5 chỉ%' THEN 'Nhan 99.99 1-5 chi'
      WHEN b.gold_type LIKE '%nhan SJC 99,99% 0.5 chi, 0.3 chi%' OR b.gold_type LIKE '%nhẫn SJC 99,99% 0.5 chỉ, 0.3 chỉ%' THEN 'Nhan 99.99 0.3-0.5 chi'
      WHEN b.gold_type LIKE '%SJC 5 chi%' OR b.gold_type LIKE '%SJC 5 chỉ%' THEN 'SJC 5 chi'
      WHEN b.gold_type LIKE '%SJC 1L, 10L, 1KG%' THEN 'SJC 1L-1KG'
      WHEN b.gold_type LIKE '%SJC 0.5 chi, 1 chi, 2 chi%' OR b.gold_type LIKE '%SJC 0.5 chỉ, 1 chỉ, 2 chỉ%' THEN 'SJC 0.5-2 chi'
      ELSE substr(b.gold_type, 1, 24)
    END AS gold_type_short,
    b.sell_price_num,
    b.sell_price_num / 1000000.0 AS sell_price_million,
    CASE WHEN b.snapshot_date = l.max_snapshot_date THEN 1 ELSE 0 END AS is_latest
  FROM base b
  CROSS JOIN latest l
uuid: 44b8f6ce-d922-4857-8478-41d81a929252
