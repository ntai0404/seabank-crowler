version: 1.0.0
table_name: stock_prices
main_dttm_col: ngay
description: Bảng giá cổ phiếu từ CafeF
columns:
- column_name: timestamp
  verbose_name: Thời gian cào
  is_dttm: true
  type: DATETIME
- column_name: symbol
  verbose_name: Mã chứng khoán
  type: STRING
- column_name: ngay
  verbose_name: Ngày giao dịch
  is_dttm: true
  type: DATETIME
- column_name: gia_mo_cua
  verbose_name: Giá mở cửa
  type: FLOAT
- column_name: gia_cao_nhat
  verbose_name: Giá cao nhất
  type: FLOAT
- column_name: gia_thap_nhat
  verbose_name: Giá thấp nhất
  type: FLOAT
- column_name: gia_dong_cua
  verbose_name: Giá đóng cửa
  type: FLOAT
- column_name: base_close_price
  verbose_name: Gia dong cua phien dau ky
  type: FLOAT
- column_name: pct_change_base
  verbose_name: Bien dong % so voi dau ky
  type: FLOAT
